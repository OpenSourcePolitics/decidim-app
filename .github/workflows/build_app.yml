on:
  workflow_call:
    inputs:
      ruby_version:
        description: 'Ruby Version'
        default: "3.3.4"
        type: string
        required: false
      node_version:
        description: 'Node version'
        default: '22.16.0'
        required: false
        type: string
jobs:
  build_app:
    name: Build app
    runs-on: ubuntu-22.04
    if: "!startsWith(github.head_ref, 'chore/l10n')"
    timeout-minutes: 60
    env:
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_HOST: localhost
      RUBYOPT: '-W:no-deprecated'
    services:
      postgres:
        image: postgres:16-alpine
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        env:
          POSTGRES_PASSWORD: postgres
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ inputs.ruby_version }}
          bundler-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'
          cache-dependency-path: ./package-lock.json
      - run: npm config set fetch-retries 5 && npm config set fetch-retry-mintimeout 20000 && npm config set fetch-retry-maxtimeout 120000
        name: Tune NPM configuration
        shell: "bash"
      - run: npm install
        name: Install JS dependencies
        shell: "bash"
        env:
          NODE_ENV: test
      - run: bundle exec rake test:setup
        name: Create test app
        shell: "bash"
      - run: mkdir -p ./spec/tmp/screenshots
        name: Create the screenshots folder
        shell: "bash"
      - run: bundle exec rails shakapacker:compile
        name: Precompile assets
        shell: "bash"
        env:
          NODE_ENV: "test"
          RAILS_ENV: "test"
      - name: Prepare cache directory
        run: |
          echo "Build completed at $(date)" > .build_complete
          
          echo "Listing root directory:"
          ls -la || true
          
          if [ -d node_modules ]; then
            echo "node_modules exists"
            echo "First 20 entries in node_modules:"
            ls node_modules | sed -n '1,20p'
          else
            echo "node_modules does not exist"
          fi
        shell: bash
      - name: Save application cache
        id: cache-save
        uses: actions/cache/save@v4
        with:
          path: ./
          key: app-${{ github.sha }}
      - name: Verify cache was saved
        run: |
          echo "Cache saved with key: app-${{ github.sha }}"
          echo "Cache hit: ${{ steps.cache-save.outputs.cache-hit }}"